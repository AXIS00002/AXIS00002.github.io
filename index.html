<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>楽天商品批量抓取与检查清单</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 28px 18px;
      background: #f5f5f7;
      color: #1d1d1f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Microsoft YaHei", "Noto Sans SC", sans-serif;
    }
    .wrap { max-width: 1400px; margin: 0 auto; }
    h1 { margin: 0 0 6px; font-size: 28px; }
    .sub { margin: 0 0 20px; color: #666; line-height: 1.7; }
    .panel {
      margin-bottom: 18px;
      padding: 22px;
      background: #fff;
      border: 1px solid #e3e3e8;
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(0,0,0,.06);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: 14px; font-weight: 700; }
    input, select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #cfcfd5;
      border-radius: 8px;
      background: #fff;
      font-size: 15px;
    }
    input:focus, select:focus {
      outline: 2px solid #555;
      outline-offset: 1px;
    }
    .hint { color: #777; font-size: 12px; line-height: 1.55; }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 11px 17px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button.primary { background: #1d1d1f; color: #fff; }
    button.secondary { background: #e9e9ee; color: #1d1d1f; }
    button.danger { background: #fff0f0; color: #b00020; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    #status {
      margin-top: 16px;
      padding: 12px 14px;
      background: #f6f6f8;
      border-radius: 8px;
      white-space: pre-wrap;
      line-height: 1.65;
    }
    #status.success { background: #edf9f0; color: #176b2c; }
    #status.error { background: #fff0f0; color: #b00020; }
    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }
    .chip {
      padding: 7px 10px;
      background: #f0f0f4;
      border-radius: 999px;
      font-size: 13px;
    }
    .table-wrap {
      overflow: auto;
      max-height: 72vh;
      border: 1px solid #dedee3;
      border-radius: 10px;
    }
    table {
      width: 100%;
      min-width: 1180px;
      border-collapse: collapse;
      background: #fff;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid #e5e5ea;
      border-right: 1px solid #eeeeF2;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #eeeeF2;
      white-space: nowrap;
    }
    tr:hover td { background: #fafafd; }
    .img {
      display: block;
      width: 96px;
      height: 96px;
      object-fit: contain;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
    }
    .name { min-width: 320px; line-height: 1.55; }
    .caption {
      min-width: 360px;
      max-width: 520px;
      max-height: 120px;
      overflow: auto;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .code { white-space: nowrap; font-family: ui-monospace, Consolas, monospace; }
    a { color: #0066cc; word-break: break-all; }
    .warn { color: #b35c00; font-weight: 700; }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .field.full { grid-column: auto; }
      h1 { font-size: 23px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>楽天商品批量抓取与检查清单</h1>
  <p class="sub">
    从指定店铺与关键词抓取商品名、商品管理番号、商品 URL、主图和 API 商品说明，
    并导出可用于 Tampermonkey 批量详情检查器的 CSV。<br>
    注意：公开商品搜索 API 不返回 RMS 的“商品番号”，因此该列先留空，之后由商品页检查器提取或人工补充。
  </p>

  <section class="panel">
    <div class="grid">
      <div class="field">
        <label for="applicationId">Application ID</label>
        <input id="applicationId" type="text" autocomplete="off" placeholder="输入 Application ID">
      </div>

      <div class="field">
        <label for="accessKey">Access Key</label>
        <input id="accessKey" type="password" autocomplete="off" placeholder="输入 Access Key">
      </div>

      <div class="field">
        <label for="shopCode">店铺代码 shopCode</label>
        <input id="shopCode" type="text" autocomplete="off" placeholder="例如：lovestyle">
        <div class="hint">填写商品 URL 中 item.rakuten.co.jp/ 后面的店铺代码，不是数字店舗ID。</div>
      </div>

      <div class="field">
        <label for="keyword">商品系列关键词</label>
        <input id="keyword" type="text" autocomplete="off" placeholder="例如：BCI-380">
      </div>

      <div class="field">
        <label for="ngKeyword">排除关键词（可不填）</label>
        <input id="ngKeyword" type="text" autocomplete="off" placeholder="例如：クリーニング 洗浄">
      </div>

      <div class="field">
        <label for="maxPages">最大抓取页数</label>
        <select id="maxPages">
          <option value="5">5 页（最多 150 件）</option>
          <option value="10" selected>10 页（最多 300 件）</option>
          <option value="30">30 页（最多 900 件）</option>
          <option value="100">100 页（API 上限）</option>
        </select>
      </div>

      <div class="field">
        <label for="delayMs">翻页间隔</label>
        <select id="delayMs">
          <option value="1500">1.5 秒</option>
          <option value="2500" selected>2.5 秒（推荐）</option>
          <option value="4000">4 秒（更稳）</option>
        </select>
      </div>

      <div class="field">
        <label for="availability">商品状态</label>
        <select id="availability">
          <option value="0" selected>在售与停售都抓取</option>
          <option value="1">只抓取可购买商品</option>
        </select>
      </div>
    </div>

    <div class="buttons">
      <button id="startButton" class="primary">开始抓取</button>
      <button id="stopButton" class="danger" disabled>停止</button>
      <button id="csvButton" class="secondary" disabled>导出检查用 CSV</button>
      <button id="jsonButton" class="secondary" disabled>复制 JSON</button>
      <button id="urlButton" class="secondary" disabled>复制商品 URL</button>
      <button id="clearButton" class="secondary">清空结果</button>
    </div>

    <div id="status">等待开始。</div>
  </section>

  <section class="panel">
    <div class="summary">
      <span class="chip">结果：<strong id="resultCount">0</strong></span>
      <span class="chip">有主图：<strong id="imageCount">0</strong></span>
      <span class="chip">缺少主图：<strong id="missingImageCount">0</strong></span>
      <span class="chip">重复商品管理番号：<strong id="duplicateCount">0</strong></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
        <tr>
          <th>#</th>
          <th>主图</th>
          <th>商品名</th>
          <th>商品番号</th>
          <th>商品管理番号</th>
          <th>商品 URL</th>
          <th>API 商品说明</th>
        </tr>
        </thead>
        <tbody id="resultBody">
          <tr><td colspan="7">尚未抓取。</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</div>

<script>
(() => {
  'use strict';

  const API_ENDPOINT =
    'https://openapi.rakuten.co.jp/ichibams/api/IchibaItem/Search/20260701';

  const $ = id => document.getElementById(id);

  const startButton = $('startButton');
  const stopButton = $('stopButton');
  const csvButton = $('csvButton');
  const jsonButton = $('jsonButton');
  const urlButton = $('urlButton');
  const clearButton = $('clearButton');
  const status = $('status');
  const resultBody = $('resultBody');

  let products = [];
  let stopRequested = false;

  startButton.addEventListener('click', fetchAllProducts);
  stopButton.addEventListener('click', () => {
    stopRequested = true;
    showStatus('已请求停止，将在当前请求结束后停止。');
  });
  csvButton.addEventListener('click', downloadCsv);
  jsonButton.addEventListener('click', copyJson);
  urlButton.addEventListener('click', copyUrls);
  clearButton.addEventListener('click', clearResults);

  async function fetchAllProducts() {
    const applicationId = $('applicationId').value.trim();
    const accessKey = $('accessKey').value.trim();
    const shopCode = $('shopCode').value.trim();
    const keyword = $('keyword').value.trim();
    const ngKeyword = $('ngKeyword').value.trim();
    const maxPages = Number($('maxPages').value);
    const delayMs = Number($('delayMs').value);
    const availability = $('availability').value;

    if (!applicationId || !accessKey || !shopCode || !keyword) {
      showError('请填写 Application ID、Access Key、shopCode 和商品系列关键词。');
      return;
    }

    products = [];
    stopRequested = false;
    render();
    setRunning(true);

    let page = 1;
    let pageCount = 1;
    let rawCount = 0;

    try {
      do {
        if (stopRequested) {
          showStatus(`已停止。当前保留 ${products.length} 件商品。`);
          break;
        }

        showStatus(
          `正在抓取第 ${page} 页……\n` +
          `当前已整理 ${products.length} 件商品。`
        );

        const params = new URLSearchParams({
          applicationId,
          accessKey,
          shopCode,
          keyword,
          hits: '30',
          page: String(page),
          format: 'json',
          formatVersion: '2',
          imageFlag: '1',
          availability,
          elements: [
            'count',
            'page',
            'pageCount',
            'itemName',
            'itemCode',
            'itemUrl',
            'mediumImageUrls',
            'itemCaption',
            'catchcopy',
            'availability'
          ].join(',')
        });

        if (ngKeyword) {
          params.set('NGKeyword', ngKeyword);
        }

        const response = await fetchWithRetry(
          `${API_ENDPOINT}?${params.toString()}`,
          5
        );

        const text = await response.text();
        let data;

        try {
          data = JSON.parse(text);
        } catch {
          throw new Error(`API 返回的不是 JSON：\n${text.slice(0, 800)}`);
        }

        if (!response.ok || data.error) {
          throw new Error(
            data.error_description ||
            data.error ||
            `HTTP ${response.status}`
          );
        }

        const items = Array.isArray(data.items)
          ? data.items
          : Array.isArray(data.Items)
            ? data.Items
            : [];

        rawCount += items.length;

        for (const raw of items) {
          const item = raw.Item || raw.item || raw;
          const fullItemCode = String(item.itemCode || '');
          const managementNumber = removeShopPrefix(fullItemCode);
          const itemUrl = String(item.itemUrl || '');
          const imageUrl = getFirstImage(item.mediumImageUrls);
          const apiCaption = cleanText(
            [item.catchcopy, item.itemCaption]
              .filter(Boolean)
              .join('\n')
          );

          products.push({
            商品名: cleanText(item.itemName || ''),
            商品番号: '',
            商品管理番号: managementNumber,
            商品URL: itemUrl,
            商品主图: stripDownsize(imageUrl),
            API商品说明: apiCaption,
            在售状态: String(item.availability ?? '')
          });
        }

        products = dedupeProducts(products);

        pageCount = Math.min(
          Number(data.pageCount || data.PageCount || 1),
          maxPages,
          100
        );

        render();

        if (page < pageCount) {
          await sleep(delayMs);
        }

        page += 1;
      } while (page <= pageCount);

      if (!stopRequested) {
        showSuccess(
          `抓取完成：API 返回 ${rawCount} 条，去重后 ${products.length} 件。\n` +
          `已包含商品管理番号、商品 URL、主图和 API 商品说明。`
        );
      }
    } catch (error) {
      console.error(error);
      showError(
        '抓取失败：\n' +
        (error instanceof Error ? error.message : String(error))
      );
    } finally {
      setRunning(false);
      updateButtons();
    }
  }

  async function fetchWithRetry(url, maxRetries) {
    for (let attempt = 0; attempt <= maxRetries; attempt++) {
      const response = await fetch(url);

      if (response.status !== 429) {
        return response;
      }

      if (attempt === maxRetries) {
        return response;
      }

      const retryAfter = Number(response.headers.get('Retry-After'));
      const waitMs = Number.isFinite(retryAfter) && retryAfter > 0
        ? retryAfter * 1000
        : Math.min(5000 * Math.pow(2, attempt), 60000);

      showStatus(
        `遇到 HTTP 429，等待 ${Math.round(waitMs / 1000)} 秒后重试……\n` +
        `重试 ${attempt + 1}/${maxRetries}`
      );

      await sleep(waitMs);

      if (stopRequested) {
        return response;
      }
    }
  }

  function removeShopPrefix(itemCode) {
    const index = itemCode.indexOf(':');
    return index >= 0 ? itemCode.slice(index + 1) : itemCode;
  }

  function getFirstImage(value) {
    if (!Array.isArray(value) || value.length === 0) return '';
    const first = value[0];
    if (typeof first === 'string') return first;
    return first?.imageUrl || first?.imageURL || first?.url || '';
  }

  function stripDownsize(value) {
    if (!value) return '';
    try {
      const url = new URL(value);
      url.searchParams.delete('downsize');
      return url.href;
    } catch {
      return String(value)
        .replace(/([?&])downsize=[^&]*(?:&|$)/i, '$1')
        .replace(/[?&]$/, '');
    }
  }

  function cleanText(value) {
    return String(value ?? '')
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/<[^>]+>/g, ' ')
      .replace(/&nbsp;/gi, ' ')
      .replace(/&amp;/gi, '&')
      .replace(/&lt;/gi, '<')
      .replace(/&gt;/gi, '>')
      .replace(/&quot;/gi, '"')
      .replace(/&#39;/gi, "'")
      .replace(/[ \t]+/g, ' ')
      .replace(/\n{3,}/g, '\n\n')
      .trim();
  }

  function dedupeProducts(list) {
    const map = new Map();

    for (const item of list) {
      const key =
        item.商品管理番号 ||
        item.商品URL ||
        `${item.商品名}|${item.商品主图}`;

      if (!map.has(key)) {
        map.set(key, item);
      }
    }

    return [...map.values()];
  }

  function render() {
    if (products.length === 0) {
      resultBody.innerHTML =
        '<tr><td colspan="7">尚未抓取或没有符合条件的商品。</td></tr>';
      updateSummary();
      updateButtons();
      return;
    }

    resultBody.replaceChildren();

    products.forEach((product, index) => {
      const tr = document.createElement('tr');

      tr.appendChild(textCell(String(index + 1)));

      const imageTd = document.createElement('td');
      if (product.商品主图) {
        const a = document.createElement('a');
        a.href = product.商品主图;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';

        const img = document.createElement('img');
        img.src = product.商品主图;
        img.alt = product.商品名;
        img.loading = 'lazy';
        img.className = 'img';

        a.appendChild(img);
        imageTd.appendChild(a);
      } else {
        imageTd.innerHTML = '<span class="warn">无主图</span>';
      }
      tr.appendChild(imageTd);

      tr.appendChild(textCell(product.商品名, 'name'));

      const itemNumberTd = textCell(
        product.商品番号 || 'API 不提供',
        product.商品番号 ? 'code' : 'warn'
      );
      tr.appendChild(itemNumberTd);

      tr.appendChild(textCell(product.商品管理番号, 'code'));

      const urlTd = document.createElement('td');
      if (product.商品URL) {
        const a = document.createElement('a');
        a.href = product.商品URL;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = '打开商品页';
        urlTd.appendChild(a);
      }
      tr.appendChild(urlTd);

      tr.appendChild(textCell(product.API商品说明, 'caption'));

      resultBody.appendChild(tr);
    });

    updateSummary();
    updateButtons();
  }

  function textCell(text, className = '') {
    const td = document.createElement('td');
    td.textContent = text || '';
    if (className) td.className = className;
    return td;
  }

  function updateSummary() {
    const imageCount = products.filter(x => x.商品主图).length;
    const keys = products.map(x => x.商品管理番号).filter(Boolean);
    const duplicateCount = keys.length - new Set(keys).size;

    $('resultCount').textContent = String(products.length);
    $('imageCount').textContent = String(imageCount);
    $('missingImageCount').textContent =
      String(products.length - imageCount);
    $('duplicateCount').textContent = String(duplicateCount);
  }

  function downloadCsv() {
    if (products.length === 0) return;

    const headers = [
      '商品名',
      '商品番号',
      '商品管理番号',
      '商品URL',
      '商品主图',
      'API商品说明'
    ];

    const rows = [
      headers,
      ...products.map(item => headers.map(header => item[header] ?? ''))
    ];

    const csv = '\uFEFF' +
      rows.map(row => row.map(escapeCsv).join(',')).join('\r\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');

    const shop = sanitizeFileName($('shopCode').value.trim() || 'shop');
    const keyword =
      sanitizeFileName($('keyword').value.trim() || 'products');

    a.href = url;
    a.download = `${shop}_${keyword}_详情检查用.csv`;
    document.body.appendChild(a);
    a.click();
    a.remove();

    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  async function copyJson() {
    if (products.length === 0) return;
    await copyText(JSON.stringify(products, null, 2));
    showSuccess(`已复制 ${products.length} 件商品的 JSON。`);
  }

  async function copyUrls() {
    if (products.length === 0) return;
    const urls = products.map(x => x.商品URL).filter(Boolean).join('\n');
    await copyText(urls);
    showSuccess(`已复制 ${urls ? urls.split('\n').length : 0} 个商品 URL。`);
  }

  async function copyText(text) {
    try {
      await navigator.clipboard.writeText(text);
    } catch {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      textarea.remove();
    }
  }

  function escapeCsv(value) {
    return `"${String(value ?? '').replaceAll('"', '""')}"`;
  }

  function sanitizeFileName(value) {
    return String(value).replace(/[\\/:*?"<>|]/g, '_');
  }

  function clearResults() {
    products = [];
    stopRequested = true;
    render();
    showStatus('结果已清空。');
  }

  function setRunning(running) {
    startButton.disabled = running;
    stopButton.disabled = !running;
    clearButton.disabled = running;
  }

  function updateButtons() {
    const disabled = products.length === 0;
    csvButton.disabled = disabled;
    jsonButton.disabled = disabled;
    urlButton.disabled = disabled;
  }

  function showStatus(message) {
    status.className = '';
    status.textContent = message;
  }

  function showSuccess(message) {
    status.className = 'success';
    status.textContent = message;
  }

  function showError(message) {
    status.className = 'error';
    status.textContent = message;
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  render();
})();
</script>
</body>
</html>
